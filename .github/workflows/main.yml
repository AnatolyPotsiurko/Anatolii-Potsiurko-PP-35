name: CI/CD Pipeline

on:
  push:
    branches:
      - develop  # Пайплайн запускається на push до гілки develop
  pull_request:
    branches:
      - develop  # Пайплайн запускається при створенні Pull Request на гілку develop
      
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit